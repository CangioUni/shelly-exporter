name: golangci-lint

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: false # golangci-lint-action handles its own caching

      - name: Run golangci-lint
        uses: golangci-lint/golangci-lint-action@v6
        with:
          version: v1.60 # Specify the desired golangci-lint version
